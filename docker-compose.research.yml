# Self-Hostable Research Platform Stack
# docker-compose.research.yml
#
# Starts the complete Rabbit Hole research platform:
#   docker compose -f docker-compose.research.yml up -d
#
# Services:
# - rabbit-hole (Next.js): http://localhost:3399
# - Neo4j Browser: http://localhost:7474 (neo4j/your-neo4j-password)
# - MinIO Console: http://localhost:9001 (minio/your-minio-password)
# - Job Processor API: http://localhost:8680
# - LangGraph Agent: http://localhost:8123
#
# Prerequisites:
# 1. Copy .env.research.example to .env.research
# 2. Add API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.)
# 3. docker compose -f docker-compose.research.yml up -d

services:
  # === DATA LAYER ===

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: rabbit-hole-postgres:research
    container_name: research-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rabbit_hole_app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_APP_USER=app_user
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD:-changeme}
      - POSTGRES_JOB_USER=jobqueue
      - POSTGRES_JOB_PASSWORD=${POSTGRES_JOB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - research_postgres_data:/var/lib/postgresql/data
    networks:
      - research-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-jobs:
    image: postgres:17-alpine
    container_name: research-postgres-jobs
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sidequest
      - POSTGRES_USER=jobqueue
      - POSTGRES_PASSWORD=${POSTGRES_JOB_PASSWORD:-changeme}
    volumes:
      - research_postgres_jobs_data:/var/lib/postgresql/data
    networks:
      - research-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobqueue -d sidequest"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    container_name: research-neo4j
    image: neo4j:5.15-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_initial__size: 256M
      NEO4J_server_memory_heap_max__size: 512M
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_default__listen__address: 0.0.0.0
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - research_neo4j_data:/data
      - research_neo4j_logs:/logs
    networks:
      - research-stack
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio:
    container_name: research-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme}
      - MINIO_SERVER_URL=http://localhost:9000
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - research_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - research-stack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: research-minio-init
    restart: "no"
    entrypoint: ["/bin/sh", "/scripts/setup-minio-buckets.sh"]
    environment:
      - MINIO_HOST=http://minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-changeme}
      - MINIO_ALIAS=local
    volumes:
      - ./scripts/setup-minio-buckets.sh:/scripts/setup-minio-buckets.sh:ro
    networks:
      - research-stack
    depends_on:
      minio:
        condition: service_healthy

  # === PROCESSING LAYER ===

  job-processor:
    container_name: research-job-processor
    build:
      context: .
      dockerfile: services/job-processor/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobqueue:${POSTGRES_JOB_PASSWORD:-changeme}@postgres-jobs:5432/sidequest
      - APP_DATABASE_URL=postgresql://app_user:${POSTGRES_APP_PASSWORD:-changeme}@postgres:5432/rabbit_hole_app
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-changeme}
      - MINIO_USE_SSL=false
      - JOB_WORKERS=3
      - LOG_LEVEL=INFO
      - DASHBOARD_PORT=8678
      - HEALTH_PORT=8679
      - API_PORT=8680
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "8680:8680"
    networks:
      - research-stack
    depends_on:
      postgres-jobs:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["node", "dist/server.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8679/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # === AGENT LAYER ===
  # Qdrant runs on protolabs AI stack (port 6333, reachable via Tailscale).
  # Set QDRANT_URL=http://protolabs:6333 in .env.local / environment.
  # SearXNG is provided by the homelab AI stack (port 8888 on host).
  # Containers reach it via host.docker.internal:8888.

  langgraph-agent:
    container_name: research-langgraph-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8123
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SEARXNG_ENDPOINT=http://host.docker.internal:8888
      - JOB_PROCESSOR_URL=http://job-processor:8680
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - QDRANT_URL=http://host.docker.internal:6333
      - OLLAMA_ENDPOINT=http://host.docker.internal:11434
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8123:8123"
    networks:
      - research-stack
    depends_on:
      neo4j:
        condition: service_healthy
      job-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # === APPLICATION LAYER ===
  # rabbit-hole runs outside Docker via `pnpm dev` (Next.js too memory-heavy for Docker build)
  # Connect to Docker services via localhost ports exposed above.
  # Required env vars in apps/rabbit-hole/.env.local:
  #   APP_DATABASE_URL=postgresql://app_user:<your-app-password>@localhost:5432/rabbit_hole_app
  #   NEO4J_URI=bolt://localhost:7687
  #   NEO4J_USER=neo4j
  #   NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
  #   JOB_PROCESSOR_URL=http://localhost:8680
  #   MINIO_ENDPOINT=localhost:9000
  #   MINIO_ACCESS_KEY=minio
  #   MINIO_SECRET_KEY=<your-minio-password>
  #   MINIO_USE_SSL=false
  #   COPILOTKIT_REMOTE_URL=http://localhost:8123
  #   CLERK_SECRET_KEY=<your key>
  #   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=<your key>

volumes:
  research_postgres_data:
    driver: local
  research_postgres_jobs_data:
    driver: local
  research_neo4j_data:
    driver: local
  research_neo4j_logs:
    driver: local
  research_minio_data:
    driver: local

networks:
  research-stack:
    driver: bridge
