# Self-Hostable Research Platform Stack
# docker-compose.research.yml
#
# Starts the complete Rabbit Hole research platform:
#   docker compose -f docker-compose.research.yml up -d
#
# Services:
# - rabbit-hole (Next.js): http://localhost:3000
# - Neo4j Browser: http://localhost:7474 (neo4j/evidencegraph2024)
# - MinIO Console: http://localhost:9001 (minio/minio123)
# - Job Processor API: http://localhost:8680
# - LangGraph Agent: http://localhost:8123
#
# Prerequisites:
# 1. Copy .env.research.example to .env.research
# 2. Add API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.)
# 3. docker compose -f docker-compose.research.yml up -d

services:
  # === DATA LAYER ===

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: rabbit-hole-postgres:research
    container_name: research-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rabbit_hole_app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres2024
      - POSTGRES_APP_USER=app_user
      - POSTGRES_APP_PASSWORD=rabbit2024
      - POSTGRES_JOB_USER=jobqueue
      - POSTGRES_JOB_PASSWORD=jobs2024
    ports:
      - "5432:5432"
    volumes:
      - research_postgres_data:/var/lib/postgresql/data
    networks:
      - research-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-jobs:
    image: postgres:17-alpine
    container_name: research-postgres-jobs
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sidequest
      - POSTGRES_USER=jobqueue
      - POSTGRES_PASSWORD=jobs2024
    volumes:
      - research_postgres_jobs_data:/var/lib/postgresql/data
    networks:
      - research-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobqueue -d sidequest"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    container_name: research-neo4j
    image: neo4j:5.15-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/evidencegraph2024
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
      NEO4J_dbms_security_procedures_allowlist: gds.*,apoc.*
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_server_default__listen__address: 0.0.0.0
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - research_neo4j_data:/data
      - research_neo4j_logs:/logs
    networks:
      - research-stack
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p evidencegraph2024 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio:
    container_name: research-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
      - MINIO_SERVER_URL=http://localhost:9000
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - research_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - research-stack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: research-minio-init
    restart: "no"
    entrypoint: ["/bin/sh", "/scripts/setup-minio-buckets.sh"]
    environment:
      - MINIO_HOST=http://minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - MINIO_ALIAS=local
    volumes:
      - ./scripts/setup-minio-buckets.sh:/scripts/setup-minio-buckets.sh:ro
    networks:
      - research-stack
    depends_on:
      minio:
        condition: service_healthy

  # === PROCESSING LAYER ===

  job-processor:
    container_name: research-job-processor
    build:
      context: .
      dockerfile: services/job-processor/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobqueue:jobs2024@postgres-jobs:5432/sidequest
      - APP_DATABASE_URL=postgresql://app_user:rabbit2024@postgres:5432/rabbit_hole_app
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=evidencegraph2024
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - MINIO_USE_SSL=false
      - JOB_WORKERS=3
      - LOG_LEVEL=INFO
      - DASHBOARD_PORT=8678
      - HEALTH_PORT=8679
      - API_PORT=8680
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "8680:8680"
    networks:
      - research-stack
    depends_on:
      postgres-jobs:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["node", "dist/server.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8679/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # === AGENT LAYER ===

  langgraph-agent:
    container_name: research-langgraph-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8123
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - JOB_PROCESSOR_URL=http://job-processor:8680
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=evidencegraph2024
    ports:
      - "8123:8123"
    networks:
      - research-stack
    depends_on:
      neo4j:
        condition: service_healthy
      job-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # === APPLICATION LAYER ===
  # rabbit-hole runs outside Docker via `pnpm dev` (Next.js too memory-heavy for Docker build)
  # Connect to Docker services via localhost ports exposed above.
  # Required env vars in apps/rabbit-hole/.env.local:
  #   APP_DATABASE_URL=postgresql://app_user:rabbit2024@localhost:5432/rabbit_hole_app
  #   NEO4J_URI=bolt://localhost:7687
  #   NEO4J_USER=neo4j
  #   NEO4J_PASSWORD=evidencegraph2024
  #   JOB_PROCESSOR_URL=http://localhost:8680
  #   MINIO_ENDPOINT=localhost:9000
  #   MINIO_ACCESS_KEY=minio
  #   MINIO_SECRET_KEY=minio123
  #   MINIO_USE_SSL=false
  #   COPILOTKIT_REMOTE_URL=http://localhost:8123
  #   CLERK_SECRET_KEY=<your key>
  #   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=<your key>

volumes:
  research_postgres_data:
    driver: local
  research_postgres_jobs_data:
    driver: local
  research_neo4j_data:
    driver: local
  research_neo4j_logs:
    driver: local
  research_minio_data:
    driver: local

networks:
  research-stack:
    driver: bridge
