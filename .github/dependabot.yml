# Dependabot Configuration - 2025 Best Practices
# Optimized for pnpm monorepo with Python services and Docker

version: 2

# Enable grouped updates to reduce PR noise
enable-beta-ecosystems: true

updates:
  # ==================== NPM/PNPM ====================

  # Root entry — covers the ENTIRE pnpm workspace (apps/*, packages/*, agent,
  # services/*) and the single root pnpm-lock.yaml.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      # Group all non-major updates together
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Separate group for dev dependencies
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Allow all updates (remove tinacms restriction)
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "root"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # NOTE: do NOT add per-member npm entries for workspace packages (e.g.
  # directory: "/agent"). `agent` and `services/*` are pnpm workspace members
  # sharing the single root pnpm-lock.yaml, which the root entry above already
  # maintains. A sub-directory entry updates only that member's package.json
  # and cannot touch the root lockfile, so CI's `pnpm install --frozen-lockfile`
  # fails with ERR_PNPM_OUTDATED_LOCKFILE and the PR can never merge.
  # (The old "/agent" and "/services/yjs-collaboration-server" npm entries were
  # removed for exactly this reason.)

  # ==================== DOCKER ====================

  # Main Docker Compose files
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    groups:
      docker-images:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps-docker)"

  # Agent Dockerfiles
  - package-ecosystem: "docker"
    directory: "/agent"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    groups:
      docker-agent:
        patterns:
          - "*"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
      - "agent"
    commit-message:
      prefix: "chore(deps-docker-agent)"

  # Job-processor Dockerfile (the one live service)
  - package-ecosystem: "docker"
    directory: "/services/job-processor"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    groups:
      docker-job-processor:
        patterns:
          - "*"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
      - "services"
    commit-message:
      prefix: "chore(deps-docker-job-processor)"

  # ==================== GITHUB ACTIONS ====================

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    commit-message:
      prefix: "chore(deps-ci)"
