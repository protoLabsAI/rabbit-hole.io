name: Deploy marketing site to Cloudflare Pages

# The Astro marketing landing ships to https://rabbit-hole.io (Cloudflare Pages
# project `rabbit-hole-marketing`). Docs are a separate project/subdomain
# (see docs-deploy.yml). On PRs the build runs to validate, but the deploy step
# is skipped when secrets are absent.

on:
  push:
    branches: [main]
    paths:
      - "sites/marketing/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/marketing-deploy.yml"
  pull_request:
    paths:
      - "sites/marketing/**"
      - ".github/workflows/marketing-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: marketing-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build marketing site
        run: pnpm --filter rabbit-hole-marketing build

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Deploy marketing' }}
        run: |
          npx wrangler@3 pages project create rabbit-hole-marketing \
            --production-branch=main 2>/dev/null || true

          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          npx wrangler@3 pages deploy sites/marketing/dist \
            --project-name=rabbit-hole-marketing \
            --branch="$BRANCH" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${COMMIT_MESSAGE:-Deploy marketing}"
