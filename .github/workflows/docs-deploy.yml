name: Deploy docs to Cloudflare Pages

# Docs ship to https://docs.rabbit-hole.io (Cloudflare Pages project
# `rabbit-hole-docs`). Pure VitePress on a subdomain root, so base = "/".
# The marketing landing (rabbit-hole.io) is a separate Pages project.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-deploy.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Deploy docs' }}
        run: |
          # Idempotent: create the project on first run, ignore "already exists".
          npx wrangler@3 pages project create rabbit-hole-docs \
            --production-branch=main 2>/dev/null || true

          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          npx wrangler@3 pages deploy docs/.vitepress/dist \
            --project-name=rabbit-hole-docs \
            --branch="$BRANCH" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${COMMIT_MESSAGE:-Deploy docs}"
