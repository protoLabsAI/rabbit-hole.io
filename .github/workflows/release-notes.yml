name: Release Notes

# Fires on v*.*.* tag push to post polished release notes to the
# rabbit-hole.io Discord release channel (#releases-rabbit-hole).
#
# Known gap: tags pushed by release.yml using GITHUB_TOKEN do NOT trigger
# this workflow (GitHub's recursion-prevention policy on bot-pushed tags).
# Use workflow_dispatch to manually post for missed releases, or configure
# a PAT with workflows scope to break the recursion block.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to post notes for (e.g. v0.1.0). Defaults to latest tag on the workflow's checked-out commit."
        type: string
        required: false

concurrency:
  group: release-notes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-release-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git describe finds the previous tag
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post release notes to Discord
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_RABBIT_HOLE_RELEASE }}
        run: node scripts/post-release-notes.mjs
