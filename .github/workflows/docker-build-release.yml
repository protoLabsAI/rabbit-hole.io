# Docker Build - Production Release
# Single-platform (AMD64) builds triggered by version tags
#
# Cache strategy: GHCR registry cache — unlimited size, auto-managed,
# shared across runners. No dependency on GitHub Actions Cache service.

name: Docker Build - Production Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  actions: read
  attestations: write

env:
  REGISTRY: ghcr.io
  # IMAGE_BASE resolves to e.g. ghcr.io/protolabsai/rabbit-hole.io/<service>
  IMAGE_BASE: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: rabbit-hole
            context: .
            dockerfile: apps/rabbit-hole/Dockerfile
            build-args: |
              NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
              NEXT_PUBLIC_YJS_WS_URL
          - name: agent
            context: .
            dockerfile: agent/Dockerfile
            build-args: ""
          - name: job-processor
            context: .
            dockerfile: services/job-processor/Dockerfile
            build-args: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service.name }}
            org.opencontainers.image.description=Rabbit Hole ${{ matrix.service.name }} service
            org.opencontainers.image.vendor=Rabbit Hole
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        timeout-minutes: 45
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/cache:${{ matrix.service.name }}-release
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/cache:${{ matrix.service.name }}-release,mode=max
          build-args: |
            ${{ matrix.service.name == 'rabbit-hole' && format('NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY) || '' }}
            ${{ matrix.service.name == 'rabbit-hole' && format('NEXT_PUBLIC_YJS_WS_URL={0}', vars.NEXT_PUBLIC_YJS_WS_URL || '') || '' }}
          provenance: true
          sbom: true

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
          format: "sarif"
          output: "trivy-results-${{ matrix.service.name }}.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results-${{ matrix.service.name }}.sarif"
          category: "trivy-${{ matrix.service.name }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: 'v2.4.1'

      - name: Sign image with Cosign
        continue-on-error: true
        run: |
          cosign sign --yes \
            -a "repo=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "ref=${{ github.sha }}" \
            -a "tag=${{ github.ref_name }}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Generate GitHub attestation
        continue-on-error: true
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.service.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Report to job summary
        run: |
          echo "## 🚀 Released: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.service.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.service.name }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  release-summary:
    name: Release Summary
    needs: build-and-push
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate release report
        run: |
          echo "## 🎉 Production Release: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.build-and-push.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "### ✅ All Services Published" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- 🐰 rabbit-hole" >> $GITHUB_STEP_SUMMARY
            echo "- 🤖 agent" >> $GITHUB_STEP_SUMMARY
            echo "- ⚙️ job-processor" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Platform:** linux/amd64" >> $GITHUB_STEP_SUMMARY
            echo "**Security:** ✅ Scanned, signed, SBOM included" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Release Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check job logs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Create GitHub Release
        if: needs.build-and-push.result == 'success' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.4.1
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            docker pull ghcr.io/${{ github.repository }}/rabbit-hole:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository }}/job-processor:${{ github.ref_name }}
            ```

            **Platform:** linux/amd64
            **Security:** ✅ Trivy scanned, Cosign signed, SBOM included
