# Docker Build - Production Release
# Single-platform (AMD64) builds triggered by version tags
# Runs on self-hosted runner at 100.71.25.102
#
# ⚠️ Cache Management Strategy
# ─────────────────────────────
# Registry cache approach for reliability:
#
# 1. Registry Cache: GHCR-based, unlimited size, auto-managed, multi-runner ready
#
# Benefits:
# - Zero maintenance (registry auto-prunes)
# - Multi-runner ready (cache shared automatically)
# - Unlimited size (within GHCR quota)
# - No dependency on GitHub Actions Cache service

name: Docker Build - Production Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  actions: read
  attestations: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service.name }}
    runs-on: self-hosted
    timeout-minutes: 60  # Add timeout to prevent hung builds

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: rabbit-hole
            context: .
            dockerfile: apps/rabbit-hole/Dockerfile
            build-args: ""
          - name: agent
            context: .
            dockerfile: agent/Dockerfile
            build-args: ""
          - name: job-processor
            context: .
            dockerfile: services/job-processor/Dockerfile
            build-args: ""
          - name: langextract
            context: ./services/langextract-service
            dockerfile: ./services/langextract-service/Dockerfile
            build-args: ""
          - name: youtube-processor
            context: ./services/youtube-processor-service
            dockerfile: ./services/youtube-processor-service/Dockerfile
            build-args: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/protolabsai/rabbit-hole/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service.name }}
            org.opencontainers.image.description=Rabbit Hole ${{ matrix.service.name }} service (Production)
            org.opencontainers.image.vendor=Proto Labs
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        timeout-minutes: 45  # Per-service timeout
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache strategy: GHCR-based, unlimited size, auto-managed
          cache-from: type=registry,ref=${{ env.REGISTRY }}/protolabsai/rabbit-hole/cache:${{ matrix.service.name }}-release
          cache-to: type=registry,ref=${{ env.REGISTRY }}/protolabsai/rabbit-hole/cache:${{ matrix.service.name }}-release,mode=max
          provenance: true
          sbom: true
          # Add network configuration for better reliability
          network: host
          allow: network.host

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true # Report vulnerabilities but don't block releases
        with:
          image-ref: ${{ env.REGISTRY }}/protolabsai/rabbit-hole/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
          format: "sarif"
          output: "trivy-results-${{ matrix.service.name }}.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true # Don't fail if security tab upload fails
        with:
          sarif_file: "trivy-results-${{ matrix.service.name }}.sarif"
          category: "trivy-${{ matrix.service.name }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v2.4.1'

      - name: Sign image with Cosign
        continue-on-error: true # Don't block deployment if signing fails
        run: |
          cosign sign --yes \
            -a "repo=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "ref=${{ github.sha }}" \
            -a "tag=${{ github.ref_name }}" \
            ${{ env.REGISTRY }}/protolabsai/rabbit-hole/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Generate GitHub attestation
        continue-on-error: true # Don't block deployment if attestation fails
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/protolabsai/rabbit-hole/${{ matrix.service.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Report to job summary
        run: |
          echo "## 🚀 Released: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Security:** ✅ Trivy scan passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Signed:** ✅ Cosign signature" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/protolabsai/rabbit-hole/${{ matrix.service.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/protolabsai/rabbit-hole/${{ matrix.service.name }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  release-summary:
    name: Release Summary
    needs: build-and-push
    if: always()
    runs-on: self-hosted

    steps:
      - name: Generate release report
        run: |
          echo "## 🎉 Production Release: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.build-and-push.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "### ✅ All Services Published" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- 🐳 rabbit-hole" >> $GITHUB_STEP_SUMMARY
            echo "- 🤖 agent" >> $GITHUB_STEP_SUMMARY
            echo "- ⚙️ job-processor" >> $GITHUB_STEP_SUMMARY
            echo "- 🔍 langextract" >> $GITHUB_STEP_SUMMARY
            echo "- 📺 youtube-processor" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Platform:** linux/amd64" >> $GITHUB_STEP_SUMMARY
            echo "**Security:** ✅ Scanned, signed, SBOM included" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Release Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check job logs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Create GitHub Release
        if: needs.build-and-push.result == 'success' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            docker pull ghcr.io/protolabsai/rabbit-hole/rabbit-hole:${{ github.ref_name }}
            docker pull ghcr.io/protolabsai/rabbit-hole/agent:${{ github.ref_name }}
            docker pull ghcr.io/protolabsai/rabbit-hole/job-processor:${{ github.ref_name }}
            docker pull ghcr.io/protolabsai/rabbit-hole/langextract:${{ github.ref_name }}
            docker pull ghcr.io/protolabsai/rabbit-hole/youtube-processor:${{ github.ref_name }}
            ```

            Deployed to homelab-iac `stacks/rabbit-hole/` via Watchtower on `:latest` push.

            **Platform:** linux/amd64
            **Security:** ✅ Trivy scanned, Cosign signed, SBOM included
