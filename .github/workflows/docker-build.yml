name: Build and Push Docker Images (DEPRECATED)

on:
  workflow_dispatch:  # Manual trigger only - emergency use

env:
  # Registry Configuration
  REGISTRY: ghcr.io  # GitHub Container Registry
  # REGISTRY: docker.io  # Docker Hub
  # REGISTRY: registry.example.com  # Private Registry
  
  # Image names (without registry prefix)
  RABBIT_HOLE_IMAGE: ${{ github.repository }}/rabbit-hole
  AGENT_IMAGE: ${{ github.repository }}/agent
  JOB_PROCESSOR_IMAGE: ${{ github.repository }}/job-processor
  YJS_COLLAB_IMAGE: ${{ github.repository }}/yjs-collab

jobs:
  # Job 1: Build rabbit-hole (Next.js App)
  build-rabbit-hole:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Enable advanced build features
          driver-opts: image=moby/buildkit:latest
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Uncomment for Docker Hub
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # Uncomment for private registry
      # - name: Login to Private Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: registry.example.com
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.RABBIT_HOLE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push rabbit-hole
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/rabbit-hole/Dockerfile
          push: true  # Always push (needed for multi-platform)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          cache-from: type=gha,scope=rabbit-hole
          cache-to: type=gha,mode=max,scope=rabbit-hole
          platforms: linux/amd64,linux/arm64  # Multi-platform for ARM Coolify servers!
      
      - name: Image digest
        run: echo "${{ steps.build.outputs.digest }}"

  # Job 2: Build agent (LangGraph)
  build-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push agent
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent
          platforms: linux/amd64,linux/arm64

  # Job 3: Build job-processor
  build-job-processor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.JOB_PROCESSOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push job-processor
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/job-processor/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=job-processor
          cache-to: type=gha,mode=max,scope=job-processor
          platforms: linux/amd64,linux/arm64

  # Job 4: Build yjs-collaboration-server
  build-yjs-collab:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.YJS_COLLAB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push yjs-collab
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/yjs-collaboration-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=yjs-collab
          cache-to: type=gha,mode=max,scope=yjs-collab
          platforms: linux/amd64,linux/arm64

  # Job 5: Security Scanning (Optional but Recommended)
  security-scan:
    needs: [build-rabbit-hole, build-agent, build-job-processor, build-yjs-collab]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    strategy:
      matrix:
        image:
          - rabbit-hole
          - agent
          - job-processor
          - yjs-collab
    
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ github.ref_name || 'latest' }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 6: Image Size Report (Optional)
  image-size-report:
    needs: [build-rabbit-hole, build-agent, build-job-processor, build-yjs-collab]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull images and report sizes
        run: |
          {
            echo "## 📦 Docker Image Sizes"
            echo ""
            echo "| Image | Size |"
            echo "|-------|------|"
            
            for image in rabbit-hole agent job-processor yjs-collab; do
              full_image="${{ env.REGISTRY }}/${{ github.repository }}/${image}:${{ github.ref_name || 'latest' }}"
              docker pull "${full_image}"
              size=$(docker images "${full_image}" --format "{{.Size}}")
              echo "| ${image} | ${size} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

# Required GitHub Secrets:
#
# For GitHub Container Registry (automatically available):
# - GITHUB_TOKEN
#
# For Docker Hub:
# - DOCKERHUB_USERNAME
# - DOCKERHUB_TOKEN
#
# For Private Registry:
# - REGISTRY_USERNAME
# - REGISTRY_PASSWORD
#
# For Application:
# - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#
# To set secrets:
# 1. Go to repository Settings > Secrets and variables > Actions
# 2. Click "New repository secret"
# 3. Add each secret with its value

